<h1>11tycms</h1>
<p>An Electron application with React</p>
<h2>Recommended IDE Setup</h2>
<ul>
<li><a href="https://code.visualstudio.com/">VSCode</a> + <a href="https://marketplace.visualstudio.com/items?itemName=dbaeumer.vscode-eslint">ESLint</a> + <a href="https://marketplace.visualstudio.com/items?itemName=esbenp.prettier-vscode">Prettier</a></li>
</ul>
<h2>Project Setup</h2>
<h3>Install</h3>
<pre><code class="language-bash">$ npm install
</code></pre>
<h3>Development</h3>
<pre><code class="language-bash">$ npm run dev
</code></pre>
<h3>Build</h3>
<pre><code class="language-bash"># For windows
$ npm run build:win

# For macOS
$ npm run build:mac

# For Linux
$ npm run build:linux
</code></pre>
